<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SNZ.INK | Gallery</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="gallery-page">

<div id="paper"></div>
<div id="grain"></div>
<div id="light"></div>

<header class="gallery-header">

    <a href="index.html" class="back">

        ← Return Home

    </a>

    <h1>

        The Sketchbook

    </h1>

    <p>

        Nothing here is perfectly finished.

    </p>

</header>

<main class="gallery">

    <article class="painting pink">

        <div class="masking-tape left"></div>
        <div class="masking-tape right"></div>

        <img src="images/pink-room.jpg"
             alt="Pink Room">

        <div class="caption">

            <span class="chapter">ROOMS</span>

            <h2>Pink Room</h2>

            <p>
                Sometimes a room remembers
                longer than the person does.
            </p>

        </div>

    </article>

    <article class="painting flowers">

        <div class="masking-tape left"></div>
        <div class="masking-tape right"></div>

        <img src="images/blue-flowers.jpg"
             alt="Blue Flowers">

        <div class="caption">

            <span class="chapter">GARDENS</span>

            <h2>Blue Garden</h2>

            <p>

                I stopped trying to paint
                flowers accurately.

            </p>

        </div>

    </article>

</main>
</main>

<footer>

    Some paintings bloom slowly.

</footer>

<script src="script.js"></script>

</body>

</html>
